version: "3"

services:
  wppconnect:
    container_name: wpp-server
    restart: unless-stopped
    build:
      context: .
    environment:
      - VIRTUAL_HOST=api.masksan.com
      - VIRTUAL_PORT=21465
      - LETSENCRYPT_HOST=api.masksan.com
      - LETSENCRYPT_EMAIL=hmoro.dev@gmail.com
    volumes:
      - ./config.ts:/usr/src/wpp-server/config.ts
      - ./wppconnect_tokens:/usr/src/wpp-server/tokens
      - ./userDataDir:/usr/src/wpp-server/userDataDir
    ports:
      - "21465:21465"
    networks:
      - nginx-public
      - default

volumes:
  wppconnect_tokens: {}

networks:
  nginx-public:
    external: true